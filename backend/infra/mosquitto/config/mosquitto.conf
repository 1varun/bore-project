# ==============================================================================
# BORE PROJECT - MOSQUITTO BROKER CONFIGURATION
# Optimized for High-Frequency Industrial Telemetry (IIoT)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Listeners & Security
# ------------------------------------------------------------------------------
# Standard MQTT connection (used by ingestion, db_writer, modbus, witsml)
listener 1883
allow_anonymous true

# WebSockets connection (used by frontend web apps for live UI trends)
listener 9001
protocol websockets
allow_anonymous true


# ------------------------------------------------------------------------------
# 2. Performance & High-Throughput Optimizations
# ------------------------------------------------------------------------------
# Increase maximum in-flight messages (Default is 20, too low for 3000+ tag bursts)
max_inflight_messages 1000

# Increase maximum queued messages (Buffer so no data drops if db-writer slows down)
max_queued_messages 10000

# Limit maximum message size (Prevents memory blowouts from rogue massive payloads)
message_size_limit 10485760  # 10 MB limit


# ------------------------------------------------------------------------------
# 3. Persistence & Disk IO (Fail-Safes)
# ------------------------------------------------------------------------------
# Save messages to disk so they survive a container restart
persistence true
persistence_location /mosquitto/data/

# Optimize Disk IO: Save to disk every 60 seconds instead of constantly thrashing 
# the hard drive on every single small telemetry packet.
autosave_interval 60

# Ensure QoS 1/2 messages aren't fully lost on sudden crash, but primarily rely on memory
persistence_file mosquitto.db


# ------------------------------------------------------------------------------
# 4. Logging & Diagnostics
# ------------------------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning

# Turn off noisy "notice" and "information" logs in production to save disk space
# log_type notice
# log_type information

# Track connection resets for debugging ghost-disconnects from PLCs/OPC
connection_messages true

# Decrease frequency of $SYS topic generation (internal broker stats) to reduce network noise
sys_interval 30
